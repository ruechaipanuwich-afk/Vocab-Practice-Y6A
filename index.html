<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocab Practice Y6A</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Kanit',sans-serif;
margin:0;
background:linear-gradient(135deg,#6a5acd,#836fff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.container{
background:rgba(255,255,255,0.96);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
width:100%;
max-width:650px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

h1{
text-align:center;
color:#4b3cc4;
margin-bottom:10px;
font-weight:600;
}

.progress{
height:10px;
background:#eee;
border-radius:50px;
overflow:hidden;
margin:15px 0;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#6a5acd,#836fff);
transition:.3s;
}

button{
font-family:'Kanit',sans-serif;
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
width:100%;
margin-top:10px;
font-weight:500;
transition:.2s;
}

button:hover{
transform:scale(1.02);
}

button:first-of-type{
background:#6a5acd;
color:white;
}

button:last-of-type{
background:#4b3cc4;
color:white;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid #eee;
margin-top:10px;
font-size:16px;
font-family:'Kanit',sans-serif;
outline:none;
transition:.2s;
}

input:focus{
border-color:#6a5acd;
box-shadow:0 0 5px rgba(106,90,205,0.3);
}

.hidden{display:none}

#msg{
color:#ff4d4d;
text-align:center;
margin-top:10px;
font-weight:500;
}

.center{text-align:center}

h2,h3,p{
font-family:'Kanit',sans-serif;
}
</style>
</head>

<body>

<div class="container">

<h1>Vocab Practice Y6A</h1>

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="game">

<h3 id="qnum"></h3>
<p id="type">Listen and type word</p>

<button onclick="speak()">🔊 Listen</button>

<input id="ans" placeholder="Type answer">

<button onclick="submit()">Submit</button>

<p id="msg"></p>

</div>

<div id="loading" class="hidden center">
<h2>Checking...</h2>
</div>

<div id="result" class="hidden">
<h2 class="center" id="score"></h2>
<div id="review"></div>
</div>

</div>

<script>

// 🔓 unlock audio (iPhone fix)
document.body.addEventListener("click", () => {
speechSynthesis.resume();
},{once:true});

// 📚 words
const words = [
"mass","crust","gradually","erupt","sections",
"to divide exactly","least common multiple","highest common factors",
"repeated","list","concussion","pathogen","fungi","protist","virus",
"etiquette","greet","acknowledgement","reserve","prostration"
];

let q=[];
let idx=0;
let score=0;
let user=[];

// shuffle
function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

let saved = localStorage.getItem("y6a_vocab");

if(saved){
q = JSON.parse(saved);
}else{
q = shuffle(words).map(w=>({q:w,a:w}));
localStorage.setItem("y6a_vocab",JSON.stringify(q));
}

document.getElementById("qnum").innerText="Question 1/20";

// 🔊 ROYAL CLEAR VOICE (เหมือนประกาศ)
function speak(){

speechSynthesis.cancel();

setTimeout(()=>{

let text = q[idx].q;

let u = new SpeechSynthesisUtterance(text);

u.lang = "en-US";

// 🟢 ช้า + ชัด + เหมือนผู้ประกาศ
u.rate = 0.72;
u.pitch = 1.0;
u.volume = 1;

// 🎤 เลือกเสียงดีที่สุดในเครื่อง
let voices = speechSynthesis.getVoices();

let best = voices.find(v =>
v.lang.includes("en") &&
(
v.name.toLowerCase().includes("natural") ||
v.name.toLowerCase().includes("neural") ||
v.name.toLowerCase().includes("samantha") ||
v.name.toLowerCase().includes("zira") ||
v.name.toLowerCase().includes("female")
)
);

if(best){
u.voice = best;
}

speechSynthesis.speak(u);

},120);

}

// submit
function submit(){

let a=document.getElementById("ans").value.trim();

if(!a){
document.getElementById("msg").innerText="You need to answer first";
return;
}

document.getElementById("msg").innerText="";

if(a.toLowerCase()===q[idx].a.toLowerCase()) score++;

user.push({
q:q[idx].q,
a:a,
c:q[idx].a
});

idx++;

if(idx<q.length){
load();
}else{
finish();
}
}

function load(){

document.getElementById("ans").value="";
document.getElementById("qnum").innerText=`Question ${idx+1}/20`;
document.getElementById("bar").style.width=(idx/q.length)*100+"%";

}

function finish(){

document.getElementById("game").classList.add("hidden");
document.getElementById("loading").classList.remove("hidden");

let p=0;
let i=setInterval(()=>{
p+=2;
if(p>=100){
clearInterval(i);
show();
}
},25);

}

function show(){

document.getElementById("loading").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("score").innerText=`Score: ${score}/${q.length}`;

let r="";

user.forEach((x,i)=>{
r+=`<p>${i+1}. ${x.q} → your: ${x.a} | correct: ${x.c}</p>`;
});

document.getElementById("review").innerHTML=r;

}

</script>

</body>
</html>
