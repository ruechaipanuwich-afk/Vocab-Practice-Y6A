<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocab Practice Y6A</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:white;
border-radius:25px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#5a3ec8;
margin-bottom:10px;
font-size:2rem;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.progress{
height:12px;
background:#e5e5e5;
border-radius:999px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#667eea,#764ba2);
transition:.3s;
}

.question-box{
background:#f8f8ff;
padding:25px;
border-radius:20px;
text-align:center;
}

.question-number{
font-size:1.2rem;
font-weight:600;
color:#764ba2;
margin-bottom:10px;
}

.question-type{
font-size:1rem;
color:#555;
margin-bottom:20px;
}

.listen-btn{
border:none;
background:#667eea;
color:white;
font-size:1.1rem;
padding:14px 24px;
border-radius:15px;
cursor:pointer;
transition:.2s;
margin-bottom:20px;
}

.listen-btn:hover{
transform:scale(1.05);
}

.answer-input{
width:100%;
padding:15px;
border:2px solid #ddd;
border-radius:15px;
font-size:1rem;
outline:none;
margin-bottom:15px;
}

.answer-input:focus{
border-color:#667eea;
}

.submit-btn{
width:100%;
border:none;
padding:15px;
border-radius:15px;
font-size:1rem;
font-weight:600;
background:#764ba2;
color:white;
cursor:pointer;
}

.submit-btn:hover{
opacity:.9;
}

.message{
margin-top:15px;
text-align:center;
font-weight:500;
color:red;
}

.loading-screen{
display:none;
text-align:center;
}

.loading-title{
font-size:1.4rem;
margin-bottom:20px;
color:#764ba2;
}

.loading-bar{
height:20px;
background:#ddd;
border-radius:999px;
overflow:hidden;
}

.loading-fill{
width:0%;
height:100%;
background:linear-gradient(90deg,#667eea,#764ba2);
}

.result-screen{
display:none;
}

.score{
font-size:2rem;
font-weight:700;
text-align:center;
color:#5a3ec8;
margin-bottom:20px;
}

.answers-list{
background:#f8f8ff;
padding:20px;
border-radius:15px;
max-height:450px;
overflow:auto;
}

.answer-item{
padding:10px;
border-bottom:1px solid #ddd;
}

@media(max-width:600px){

.container{
padding:20px;
}

h1{
font-size:1.6rem;
}

}

</style>
</head>
<body>

<div class="container">

<div id="gameScreen">

<h1>Vocab Practice Y6A</h1>

<div class="subtitle">
Listen and type word
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="question-box">

<div class="question-number" id="questionNumber">
Question 1 / 20
</div>

<div class="question-type" id="questionType">
Listen and type word
</div>

<button class="listen-btn" id="listenBtn">
🔊 Listen
</button>

<input
type="text"
id="answerInput"
class="answer-input"
placeholder="Type your answer here..."
autocomplete="off"
>

<button class="submit-btn" id="submitBtn">
Submit
</button>

<div class="message" id="message"></div>

</div>

</div>

<div class="loading-screen" id="loadingScreen">

<div class="loading-title">
Checking...
</div>

<div class="loading-bar">
<div class="loading-fill" id="loadingFill"></div>
</div>

</div>

<div class="result-screen" id="resultScreen">

<div class="score" id="scoreText">
0 / 20
</div>

<div class="answers-list" id="answersList">
</div>

</div>

</div>
<script>

const listenWords = [
"mass",
"crust",
"gradually",
"erupt",
"sections",
"to divide exactly",
"least common multiple",
"highest common factors",
"repeated",
"list",
"concussion",
"pathogen",
"fungi",
"protist",
"virus",
"etiquette",
"greet",
"acknowledgement",
"reserve",
"prostration"
];

const meaningQuestions = [
{
question:"Say words of welcome",
answer:"greet"
},
{
question:"something that happens slowly in process",
answer:"gradually"
},
{
question:"a mild brain injury caused by a bump or blow to the head",
answer:"concussion"
}
];

const sentenceQuestions = [
{
word:"mass",
answer:"mass"
},
{
word:"etiquette",
answer:"etiquette"
}
];

function shuffleArray(arr){

let array=[...arr];

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}

let savedOrder=localStorage.getItem("y6a_vocab_order");

let randomWords;

if(savedOrder){

randomWords=JSON.parse(savedOrder);

}else{

randomWords=shuffleArray(listenWords);

localStorage.setItem(
"y6a_vocab_order",
JSON.stringify(randomWords)
);

}

const questions=[];

for(let i=0;i<15;i++){

questions.push({
type:"listen",
text:randomWords[i],
answer:randomWords[i]
});

}

questions.push({
type:"meaning",
text:meaningQuestions[0].question,
answer:meaningQuestions[0].answer
});

questions.push({
type:"meaning",
text:meaningQuestions[1].question,
answer:meaningQuestions[1].answer
});

questions.push({
type:"meaning",
text:meaningQuestions[2].question,
answer:meaningQuestions[2].answer
});

questions.push({
type:"sentence",
text:sentenceQuestions[0].word,
answer:sentenceQuestions[0].answer
});

questions.push({
type:"sentence",
text:sentenceQuestions[1].word,
answer:sentenceQuestions[1].answer
});

let currentQuestion=0;

let score=0;

let userAnswers=[];

const questionNumber=
document.getElementById("questionNumber");

const questionType=
document.getElementById("questionType");

const answerInput=
document.getElementById("answerInput");

const progressBar=
document.getElementById("progressBar");

const listenBtn=
document.getElementById("listenBtn");

const submitBtn=
document.getElementById("submitBtn");

const message=
document.getElementById("message");

function loadQuestion(){

const q=questions[currentQuestion];

questionNumber.textContent=
`Question ${currentQuestion+1} / 20`;

progressBar.style.width=
`${((currentQuestion)/20)*100}%`;

if(q.type==="listen"){

questionType.textContent=
"Listen and type word";

}

else if(q.type==="meaning"){

questionType.textContent=
"Write word in meaning";

}

else{

questionType.textContent=
"Write word in the sentence";

}

answerInput.value="";

message.textContent="";

}

function speakCurrentQuestion(){

const q=questions[currentQuestion];

const speech=
new SpeechSynthesisUtterance();

speech.lang="en-US";

speech.rate=0.8;

speech.text=q.text;

speechSynthesis.cancel();

speechSynthesis.speak(speech);

}

loadQuestion();

</script>
<script>

listenBtn.addEventListener("click",()=>{

speakCurrentQuestion();

});

submitBtn.addEventListener("click",submitAnswer);

answerInput.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

submitAnswer();

}

});

function submitAnswer(){

const answer=
answerInput.value.trim();

if(answer===""){

message.textContent=
"You need to answer first";

return;

}

message.textContent="";

const correctAnswer=
questions[currentQuestion].answer;

userAnswers.push({
questionNumber:currentQuestion+1,
userAnswer:answer,
correctAnswer:correctAnswer,
correct:
answer.toLowerCase()===
correctAnswer.toLowerCase()
});

if(
answer.toLowerCase()===
correctAnswer.toLowerCase()
){

score++;

}

currentQuestion++;

if(currentQuestion<20){

loadQuestion();

}

else{

showLoading();

}

}

</script>
<script>

function showLoading(){

document.getElementById("gameScreen").style.display="none";

document.getElementById("loadingScreen").style.display="block";

let width=0;

const bar=
document.getElementById("loadingFill");

const timer=setInterval(()=>{

width+=2;

bar.style.width=width+"%";

if(width>=100){

clearInterval(timer);

showResults();

}

},40);

}

function showResults(){

document.getElementById("loadingScreen").style.display="none";

document.getElementById("resultScreen").style.display="block";

document.getElementById("scoreText").textContent=
`${score} / 20`;

const answersList=
document.getElementById("answersList");

answersList.innerHTML="";

questions.forEach((q,index)=>{

const item=
document.createElement("div");

item.className="answer-item";

item.innerHTML=`
<b>${index+1}.</b> ${q.answer}
`;

answersList.appendChild(item);

});

}

</script>

</body>
</html>
